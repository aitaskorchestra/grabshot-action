name: 'GrabShot Screenshot'
description: 'Capture website screenshots in CI/CD. Visual regression testing, OG image generation, and more.'
author: 'GrabShot'
branding:
  icon: 'camera'
  color: 'purple'
inputs:
  api-key:
    description: 'Your GrabShot API key (get free at grabshot.dev)'
    required: true
  url:
    description: 'URL to screenshot'
    required: true
  output:
    description: 'Output file path'
    required: false
    default: 'screenshot.png'
  width:
    description: 'Viewport width'
    required: false
    default: '1440'
  height:
    description: 'Viewport height'
    required: false
    default: '900'
  full-page:
    description: 'Capture full page'
    required: false
    default: 'false'
  format:
    description: 'Output format (png, jpeg, webp)'
    required: false
    default: 'png'
  delay:
    description: 'Wait time in ms before capture'
    required: false
    default: '0'
outputs:
  file:
    description: 'Path to the screenshot file'
  url:
    description: 'Direct URL to the screenshot'
runs:
  using: 'node20'
  main: 'index.js'
